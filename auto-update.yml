name: Auto Update Website Content

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install node-fetch cheerio

      - name: Run code updater
        run: node update-codes.js

      - name: Commit and push changes
        run: |
          git config --global user.name "NexaPlay Bot"
          git config --global user.email "bot@nexaplay.com"
          git add .
          git commit -m "Auto update codes: $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push
