name: Auto Update Website Content

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Update content
        run: |
          echo "Auto update ran on $(date)" > last-updated.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "Auto Updater Bot"
          git config --global user.email "bot@nexaplay.com"
          git add .
          git commit -m "Auto update: $(date '+%Y-%m-%d')" || echo "No changes"
          git push
